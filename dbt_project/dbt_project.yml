name: prism_finops
version: '1.0.0'
config-version: 2
profile: prism_finops

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

clean-targets:
  - target
  - dbt_packages

vars:
  # MA fiscal year: Jul 1 - Jun 30
  fy_start_month: 7

models:
  prism_finops:
    staging:
      +materialized: view
      +schema: EOTSS_STAGING
    marts:
      anomaly:
        +materialized: table
        +schema: EOTSS_STAGING
