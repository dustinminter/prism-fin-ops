# =============================================================================
# PRISM FinOps Intelligence -- Native App Manifest
# =============================================================================
# Deploy: CREATE APPLICATION PACKAGE PRISM_FINOPS_PACKAGE;
#         ALTER APPLICATION PACKAGE PRISM_FINOPS_PACKAGE ADD VERSION v1
#           FROM @prism_finops_stage;
# =============================================================================

manifest_version: 1

version:
  name: "PRISM FinOps Intelligence"
  label: "v1.0.0"

artifacts:
  setup_script: setup_script.sql
  readme: README.md

references:
  - spending_data:
      label: "Commonwealth Spending Data"
      description: "Source table containing expenditure records by agency and fiscal period"
      privileges:
        - SELECT
      object_type: TABLE
      register_callback: config.register_reference
  - investment_data:
      label: "Capital Investment Data"
      description: "Source table containing IT investment portfolio records"
      privileges:
        - SELECT
      object_type: TABLE
      register_callback: config.register_reference
  - procurement_data:
      label: "Procurement Award Data"
      description: "Source table containing contract and award records"
      privileges:
        - SELECT
      object_type: TABLE
      register_callback: config.register_reference
  - workforce_data:
      label: "Workforce Data"
      description: "Source table containing staffing and compensation records"
      privileges:
        - SELECT
      object_type: TABLE
      register_callback: config.register_reference
  - consumer_warehouse:
      label: "Compute Warehouse"
      description: "Warehouse for running analytics queries and ML models"
      privileges:
        - USAGE
      object_type: WAREHOUSE
      register_callback: config.register_reference
