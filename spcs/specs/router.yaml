# ============================================================================
# PRISM FinOps - Router Service Specification
# Public-facing ingress that routes to backend and frontend
# ============================================================================

spec:
  containers:
    - name: router
      image: /prism_spcs/app/images/router:latest
      env:
        # These resolve via SPCS DNS
        BACKEND_HOST: prism-backend
        FRONTEND_HOST: prism-frontend
      resources:
        requests:
          cpu: 0.25
          memory: 128Mi
        limits:
          cpu: 1
          memory: 256Mi
      readinessProbe:
        port: 8080
        path: /health

  endpoints:
    - name: ingress
      port: 8080
      protocol: HTTP
      public: true

  serviceRoles:
    - name: app_user
      endpoints:
        - ingress
