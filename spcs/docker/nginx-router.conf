# ============================================================================
# PRISM FinOps - Router Nginx Configuration
# Routes API requests to backend, all else to frontend
# Uses dynamic DNS resolution for SPCS service discovery
# ============================================================================

# Use DNS resolver from environment (set by entrypoint script)
resolver ${RESOLVER} valid=10s ipv6=off;
resolver_timeout 5s;

server {
    listen 8080;
    server_name _;

    # Set upstream hosts as variables for dynamic resolution
    set $backend_host "${BACKEND_HOST}";
    set $frontend_host "${FRONTEND_HOST}";

    # Increase timeouts for long-running queries
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # Buffer settings
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Health check endpoint (local)
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # API routes -> Backend
    location /api/ {
        proxy_pass http://$backend_host:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # tRPC routes -> Backend
    location /trpc/ {
        proxy_pass http://$backend_host:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Everything else -> Frontend
    location / {
        proxy_pass http://$frontend_host:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
